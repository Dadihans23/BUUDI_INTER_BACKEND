{% extends 'custom_admin/base_admin.html' %}
{% load static %}

{% block title %}Répondre à {{ contact.name }} - Esacode Admin{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-12">
            <div class="page-title mb-4">
                <h3>Répondre à {{ contact.name }}</h3>
                <p class="text-muted">Sujet: {{ contact.subject }}</p>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-8">
            <div class="card">
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">À:</label>
                            <input type="email" class="form-control" value="{{ contact.email }}" disabled>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Sujet:</label>
                            <input type="text" class="form-control" value="Re: {{ contact.subject }}" disabled>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Votre réponse:</label>
                            <textarea class="form-control" name="reply_message" rows="10" required placeholder="Tapez votre réponse ici..."></textarea>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="mdi mdi-send"></i> Envoyer la réponse
                            </button>
                            <a href="{% url 'custom_admin:contact_detail' contact.id %}" class="btn btn-outline-secondary">
                                Annuler
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
