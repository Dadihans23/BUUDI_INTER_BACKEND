{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inscription - Cabinet Dentaire</title>
   
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
   
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
   
    <style>
        body {
            background: linear-gradient(135deg, #3A2B20, #7E6A52);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .register-card {
            max-width: 420px;
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.35);
            overflow: hidden;
        }
        .register-header {
            background: #3A2B20;
            color: #DACFB6;
            padding: 1.2rem 1rem;
            text-align: center;
        }
        .register-header h3 {
            margin: 0;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .register-header p {
            margin: 0.1rem 0 0;
            opacity: 0.85;
            font-size: 0.9rem;
        }
        .register-body {
            padding: 1.8rem 1.4rem;
            background: #DACFB6;
            color: #3A2B20;
        }

        /* Ajustements pour écrans larges (PC / desktop) */
        @media (min-width: 768px) {
            .register-card {
                max-width: 480px;               /* largeur confortable sur PC */
            }
            .register-header {
                padding: 1.8rem 2rem;
            }
            .register-body {
                padding: 2.2rem 2.5rem;         /* plus d'espace horizontal */
            }
            .form-control, .form-select {
                height: calc(1.5em + 0.9rem + 2px);
            }
            .mb-2 { margin-bottom: 1.25rem !important; }
            .btn-lg {
                padding: 0.85rem 1.5rem;
                font-size: 1.1rem;
            }
        }

        .form-label {
            font-weight: 600;
            color: #7E6A52;
            margin-bottom: 0.35rem;
        }
        .form-control, .form-select {
            border-color: #B89C82;
            background: #fff;
        }
        .form-control:focus, .form-select:focus {
            border-color: #B89C82;
            box-shadow: 0 0 0 0.2rem rgba(184, 156, 130, 0.25);
        }
        .btn-primary {
            background: #B89C82;
            border: none;
            font-weight: 600;
        }
        .btn-primary:hover {
            background: #7E6A52;
        }
        .alert {
            border-radius: 8px;
            font-size: 0.9rem;
            padding: 0.6rem 1rem;
        }
        .text-link {
            color: #B89C82;
            text-decoration: none;
        }
        .text-link:hover {
            color: #7E6A52;
            text-decoration: underline;
        }

        @media (max-width: 400px) {
            .register-body {
                padding: 1.4rem 1.2rem;
            }
            .register-header {
                padding: 1rem 0.8rem;
            }
        }
    </style>
</head>
<body>

<div class="register-card">
    <div class="register-header">
        <h3>📝 Inscription</h3>
        <p>Gestion du Cabinet Dentaire</p>
    </div>
   
    <div class="register-body">
        {% if messages %}
            {% for message in messages %}
                <div class="alert {% if 'error' in message.tags or 'danger' in message.tags %}alert-danger{% elif 'success' in message.tags %}alert-success{% else %}alert-info{% endif %} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <!-- Prénom + Nom (déjà en row) -->
            <div class="row">
                <div class="col-md-6 mb-2">
                    <label class="form-label">Prénom</label>
                    <input type="text" name="prenom" class="form-control form-control-lg" required autofocus>
                </div>
                <div class="col-md-6 mb-2">
                    <label class="form-label">Nom</label>
                    <input type="text" name="nom" class="form-control form-control-lg" required>
                </div>
            </div>

            <!-- Téléphone + Email en row sur PC -->
            <div class="row">
                <div class="col-md-6 mb-2">
                    <label class="form-label">Téléphone</label>
                    <div class="input-group input-group-lg">
                        <span class="input-group-text bg-light border-end-0">
                            <span class="material-icons">phone</span>
                        </span>
                        <input type="text" name="telephone" class="form-control" placeholder="+225 ..." required>
                    </div>
                </div>
                <div class="col-md-6 mb-2">
                    <label class="form-label">Email (optionnel)</label>
                    <div class="input-group input-group-lg">
                        <span class="input-group-text bg-light border-end-0">
                            <span class="material-icons">email</span>
                        </span>
                        <input type="email" name="email" class="form-control">
                    </div>
                </div>
            </div>

            <!-- Rôle + Mot de passe en row sur PC -->
            <div class="row">
                <div class="col-md-6 mb-2">
                    <label class="form-label">Rôle</label>
                    <select name="role" class="form-select form-select-lg" required>
                        <option value="" disabled selected>Choisir un rôle</option>
                        <option value="dentiste">Dentiste</option>
                        <option value="secretaire">Secrétaire</option>
                    </select>
                </div>
                <div class="col-md-6 mb-2">
                    <label class="form-label">Mot de passe</label>
                    <div class="input-group input-group-lg">
                        <span class="input-group-text bg-light border-end-0">
                            <span class="material-icons">lock</span>
                        </span>
                        <input type="password" name="password1" class="form-control" minlength="8" required>
                    </div>
                    <small class="text-muted d-block mt-1">Minimum 8 caractères</small>
                </div>
            </div>

            <!-- Confirmation mot de passe (seul ou en row si tu veux l'associer à autre chose) -->
            <div class="mb-3">
                <label class="form-label">Confirmation mot de passe</label>
                <div class="input-group input-group-lg">
                    <span class="input-group-text bg-light border-end-0">
                        <span class="material-icons">lock</span>
                    </span>
                    <input type="password" name="password2" class="form-control" minlength="8" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100">
                <span class="material-icons me-2 align-middle">person_add</span>
                Créer le compte
            </button>
        </form>

        <div class="text-center mt-3">
            <small class="text-muted">
                Déjà un compte ? <a href="{% url 'login' %}" class="text-link">Se connecter</a>
            </small>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
