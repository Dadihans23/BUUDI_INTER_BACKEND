<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connexion — Buudi Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.2.96/css/materialdesignicons.min.css" rel="stylesheet">
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --border: #334155;
    --teal: #14b8a6;
    --text-1: #f1f5f9;
    --text-2: #94a3b8;
    --text-3: #475569;
  }
  html, body {
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text-2);
    -webkit-font-smoothing: antialiased;
  }
  .login-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .login-card {
    width: 100%;
    max-width: 400px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  .login-top {
    background: linear-gradient(135deg, #0ea5a0 0%, #14b8a6 100%);
    padding: 32px;
    text-align: center;
  }
  .login-logo {
    width: 56px; height: 56px;
    background: rgba(15,23,42,.25);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 24px; font-weight: 800;
    color: #fff;
    margin: 0 auto 16px;
  }
  .login-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px; font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
  }
  .login-sub { font-size: 13px; color: rgba(255,255,255,.7); }
  .login-body { padding: 32px; }
  .alert-box {
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .alert-error { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.25); color: #f87171; }
  .alert-success { background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.25); color: #4ade80; }
  .field { margin-bottom: 18px; }
  .field label {
    display: block;
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .5px;
    color: var(--text-3);
    margin-bottom: 6px;
  }
  .input-wrap { position: relative; }
  .input-wrap i {
    position: absolute;
    left: 12px; top: 50%; transform: translateY(-50%);
    font-size: 18px;
    color: var(--text-3);
    pointer-events: none;
  }
  .input-wrap input {
    width: 100%;
    padding: 10px 12px 10px 40px;
    background: rgba(255,255,255,.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-1);
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .input-wrap input::placeholder { color: var(--text-3); }
  .input-wrap input:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(20,184,166,.15);
    background: rgba(255,255,255,.06);
  }
  .btn-login {
    width: 100%;
    padding: 11px;
    background: var(--teal);
    border: none;
    border-radius: 8px;
    color: #0f172a;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px; font-weight: 700;
    cursor: pointer;
    transition: background .15s, transform .1s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-top: 8px;
  }
  .btn-login:hover { background: #0ea5a0; transform: translateY(-1px); }
  .login-note {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: var(--text-3);
  }
  </style>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-top">
      <div class="login-logo">B</div>
      <div class="login-title">Buudi Admin</div>
      <div class="login-sub">Panneau d'administration</div>
    </div>
    <div class="login-body">
      {% if messages %}
        {% for message in messages %}
        <div class="alert-box {% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}">
          <i class="mdi mdi-{% if message.tags == 'error' %}alert-circle-outline{% else %}check-circle-outline{% endif %}"></i>
          {{ message }}
        </div>
        {% endfor %}
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="field">
          <label for="username">Identifiant</label>
          <div class="input-wrap">
            <i class="mdi mdi-account-outline"></i>
            <input type="text" id="username" name="username" placeholder="admin" required autofocus>
          </div>
        </div>
        <div class="field">
          <label for="password">Mot de passe</label>
          <div class="input-wrap">
            <i class="mdi mdi-lock-outline"></i>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
          </div>
        </div>
        <button type="submit" class="btn-login">
          <i class="mdi mdi-login-variant"></i>
          Se connecter
        </button>
      </form>
      <div class="login-note">Accès réservé aux administrateurs autorisés</div>
    </div>
  </div>
</div>
</body>
</html>
